# Pull the pre-built image (like rommapp/romm:latest).
# Published on push to main: ghcr.io/leowildman/worldcup-tracker:latest
#
# GUI: Portainer / OMV → paste this file → add .env or stack env vars → Deploy
# Local dev with your own code: docker compose up -d --build

services:
  worldcup-tracker:
    image: ghcr.io/leowildman/worldcup-tracker:latest
    pull_policy: always
    container_name: worldcup-tracker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WCT_CONFIG: /app/config.yaml
      WCT_DATA_DIR: /app/data
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    command: ["watch", "--interval", "900"]
    mem_limit: 128m
    memswap_limit: 128m
    cpus: 0.25
    pids_limit: 64
    init: true

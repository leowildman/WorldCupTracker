# Monitored venue pages
venues:
  - name: "Bar Kick at The Shoreditch Arms"
    url: "https://www.urbanpubsandbars.com/world-cup-2026/bar-kick-at-the-shoreditch-arms"
    parser: urban_pubs
  - name: Big Penny Social
    url: https://bigpennysocial.co.uk/whats-on/world-cup
    parser: big_penny

# Pushover notifications (credentials via env: PUSHOVER_USER_KEY, PUSHOVER_API_TOKEN)
notifications:
  enabled: false
  priority: 0
  strict: false

# Default fetch settings
fetch:
  user_agent: "WorldCupTracker/0.1 (fixture monitor; +https://github.com/yourname/WorldCupTracker)"
  timeout_seconds: 30
